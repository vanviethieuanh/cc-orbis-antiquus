# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  SCALE: 110m

tasks:
  default:
    deps:
      - setup
      - build
    cmds:
      - task: run

  run:
    cmds:
      - echo "Starting"
      - cargo run -- -i data/raw/natural_earth/ne_{{.SCALE}}_land/ne_{{.SCALE}}_land.shp

  build:
    cmds:
      - cargo build

  setup:
    cmds:
      - echo "Setting up ..."

      - mkdir -p data/raw/natural_earth
      - task: download_natural_earth

  download_natural_earth:
    desc: "Download and extract Natural Earth {{.SCALE}} land shapefile with ETag/resume support"
    dir: data/raw/natural_earth
    sources:
      - ne_{{.SCALE}}_land.zip
      - ne_{{.SCALE}}_land.zip.etag
    cmds:
      - |
        URL="https://naciscdn.org/naturalearth/{{.SCALE}}/physical/ne_{{.SCALE}}_land.zip"
        OUT="ne_{{.SCALE}}_land.zip"

        curl -L \
          --etag-save "$OUT.etag" \
          --etag-compare "$OUT.etag" \
          -z "$OUT" \
          -o "$OUT" \
          "$URL"

        if [ -f "$OUT" ]; then
          unzip -o "$OUT" -d ne_{{.SCALE}}_land
        fi
